name: Deploy Infrastructure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Install Pulumi
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Deploy with Pulumi
        working-directory: ./infra/pulumi
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          pulumi login file://.
          pulumi stack select dev || pulumi stack init dev
          pulumi up --yes --skip-preview

      - name: Get outputs
        working-directory: ./infra/pulumi
        run: |
          echo "=== DEPLOYMENT COMPLETE ==="
          echo "Load Balancer: $(pulumi stack output loadBalancerDns 2>/dev/null || echo 'pending')"
          echo "RDS Endpoint: $(pulumi stack output rdsEndpoint 2>/dev/null || echo 'pending')"
          echo "ECR Repository: $(pulumi stack output ecrRepositoryUrl 2>/dev/null || echo 'pending')"
