name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.25.6'
  PULUMI_VERSION: 'v3'
  AWS_REGION: sa-east-1

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecom
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run tests
        run: go test -v ./...
        env:
          GOOSE_DBSTRING: "host=localhost user=postgres password=postgres dbname=ecom sslmode=disable"

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Download dependencies
        run: go mod download
      
      - name: Build application
        run: go build -v -o ecom-api ./cmd

  deploy:
    name: Deploy Infrastructure & Run Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    env:
      AWS_REGION: sa-east-1
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Deploy infrastructure with Pulumi
        working-directory: ./infra/pulumi
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          pulumi login file://.
          pulumi stack select dev
          pulumi up --yes
      
      - name: Get RDS Endpoint from Pulumi Stack
        id: get-rds-endpoint
        working-directory: ./infra/pulumi
        run: |
          RDS_ENDPOINT=$(pulumi stack output rdsEndpoint)
          RDS_PORT=$(pulumi stack output rdsPort)
          RDS_DATABASE=$(pulumi stack output rdsDatabase)
          RDS_USERNAME=$(pulumi stack output rdsUsername)
          
          echo "rds_endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          echo "rds_port=$RDS_PORT" >> $GITHUB_OUTPUT
          echo "rds_database=$RDS_DATABASE" >> $GITHUB_OUTPUT
          echo "rds_username=$RDS_USERNAME" >> $GITHUB_OUTPUT
      
      - name: Install Goose CLI
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      
      - name: Wait for RDS to be available
        run: |
          for i in {1..30}; do
            if nc -z ${{ steps.get-rds-endpoint.outputs.rds_endpoint }} ${{ steps.get-rds-endpoint.outputs.rds_port }}; then
              echo "RDS is available"
              exit 0
            fi
            echo "Waiting for RDS... ($i/30)"
            sleep 10
          done
          echo "RDS failed to become available"
          exit 1
      
      - name: Run database migrations with Goose
        working-directory: ./internal/adapters/postgresql
        run: |
          goose postgres "host=${{ steps.get-rds-endpoint.outputs.rds_endpoint }} port=${{ steps.get-rds-endpoint.outputs.rds_port }} user=${{ steps.get-rds-endpoint.outputs.rds_username }} password=${{ secrets.RDS_PASSWORD }} dbname=${{ steps.get-rds-endpoint.outputs.rds_database }} sslmode=disable" up
      
      - name: Build and push Docker image
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          
          ECR_REPO=$(cd infra/pulumi && pulumi stack output ecrRepositoryUrl)
          docker build -t $ECR_REPO:latest -t $ECR_REPO:${{ github.sha }} .
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:${{ github.sha }}
      
      - name: Update ECS service
        run: |
          SERVICE_ARN=$(cd infra/pulumi && pulumi stack output ecsServiceArn)
          CLUSTER_ARN=$(cd infra/pulumi && pulumi stack output ecsClusterArn)
          
          aws ecs update-service \
            --cluster $CLUSTER_ARN \
            --service $SERVICE_ARN \
            --force-new-deployment
      
      - name: Output deployment URLs
        working-directory: ./infra/pulumi
        run: |
          echo "=== Deployment Complete ==="
          echo "Load Balancer URL: $(pulumi stack output loadBalancerDns)"
          echo "RDS Endpoint: $(pulumi stack output rdsEndpoint)"
          echo "ECR Repository: $(pulumi stack output ecrRepositoryUrl)"
