name: AWS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aws-deploy-main
  cancel-in-progress: true

env:
  AWS_REGION: sa-east-1

jobs:
  test:
    name: Testes Go
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecom
        options: >-
          --health-cmd "pg_isready -U postgres -d ecom"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        env:
          GOOSE_DBSTRING: host=localhost port=5432 user=postgres password=postgres dbname=ecom sslmode=disable
        run: go test ./...

  deploy:
    name: Deploy AWS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Deploy infrastructure with Pulumi
        working-directory: infra/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_STACK: ${{ secrets.PULUMI_STACK || 'dev-sa-east-1' }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          pulumi login
          pulumi cancel --yes --stack "$PULUMI_STACK" || true

          if pulumi stack select "$PULUMI_STACK"; then
            echo "Using existing stack: $PULUMI_STACK"
            STACK_REGION="$(pulumi config get aws:region --stack "$PULUMI_STACK" || true)"
            if [ -n "$STACK_REGION" ] && [ "$STACK_REGION" != "$AWS_REGION" ]; then
              echo "::error::Stack '$PULUMI_STACK' is configured for region '$STACK_REGION', but workflow is using '$AWS_REGION'."
              echo "::error::Use a new stack for region migration (for example: dev-sa-east-1)."
              exit 1
            fi
          else
            pulumi stack init "$PULUMI_STACK"
            pulumi config set aws:region "$AWS_REGION" --stack "$PULUMI_STACK"
          fi

          PENDING_OPS="$(pulumi stack export --stack "$PULUMI_STACK" | python -c "import json,sys; print(len(json.load(sys.stdin).get('deployment', {}).get('pending_operations', [])))")"
          if [ "$PENDING_OPS" -gt 0 ]; then
            echo "::error::Stack '$PULUMI_STACK' has $PENDING_OPS pending operation(s)."
            echo "::error::Run 'pulumi refresh --stack $PULUMI_STACK' manually once, then rerun this workflow."
            exit 1
          fi

          pulumi up --yes --stack "$PULUMI_STACK"

      - name: Read Pulumi outputs
        working-directory: infra/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_STACK: ${{ secrets.PULUMI_STACK || 'dev-sa-east-1' }}
        run: |
          echo "ECR_REPOSITORY_URL=$(pulumi stack output ecrRepositoryUrl --stack "$PULUMI_STACK")" >> "$GITHUB_ENV"
          echo "ECS_CLUSTER_ARN=$(pulumi stack output ecsClusterArn --stack "$PULUMI_STACK")" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_ARN=$(pulumi stack output ecsServiceArn --stack "$PULUMI_STACK")" >> "$GITHUB_ENV"
          echo "LOAD_BALANCER_DNS=$(pulumi stack output loadBalancerDns --stack "$PULUMI_STACK")" >> "$GITHUB_ENV"

      - name: Login to ECR
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${ECR_REPOSITORY_URL%/*}"

      - name: Build and push image
        run: |
          docker build -t "$ECR_REPOSITORY_URL:${GITHUB_SHA}" -t "$ECR_REPOSITORY_URL:latest" .
          docker push "$ECR_REPOSITORY_URL:${GITHUB_SHA}"
          docker push "$ECR_REPOSITORY_URL:latest"

      - name: Force new ECS deployment
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          CLUSTER_NAME="${ECS_CLUSTER_ARN##*/}"
          SERVICE_NAME="${ECS_SERVICE_ARN##*/}"
          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SERVICE_NAME" --force-new-deployment --region "$AWS_REGION" >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --region "$AWS_REGION"

      - name: Deployment summary
        run: |
          echo "Deploy finalizado com sucesso"
          echo "API URL: http://${LOAD_BALANCER_DNS}"
