name: Force Redeploy

on:
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1

jobs:
  redeploy:
    name: Force Stack Destroy and Redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.6'
          cache: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Pulumi
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Force destroy and clean stack
        working-directory: ./infra/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_STACK: ${{ secrets.PULUMI_STACK || 'dev' }}
        run: |
          pulumi stack select $PULUMI_STACK
          echo "Attempting stack destroy..."
          pulumi destroy --yes --skip-preview || true
          echo "Removing stack..."
          pulumi stack rm $PULUMI_STACK --yes || true
          
      - name: Create fresh stack
        working-directory: ./infra/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_STACK: ${{ secrets.PULUMI_STACK || 'dev' }}
        run: |
          pulumi stack init $PULUMI_STACK || pulumi stack select $PULUMI_STACK
          
      - name: Deploy infrastructure
        working-directory: ./infra/pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_STACK: ${{ secrets.PULUMI_STACK || 'dev' }}
        run: |
          pulumi up --yes --skip-preview
